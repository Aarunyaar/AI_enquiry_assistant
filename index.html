<!DOCTYPE html>
<html>
<head>
    <title>AI Enquiry Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        /* 🔥 MAIN CONTAINER (FIXED SIZE IMPROVEMENT) */
        .chat-container {
            width: 700px;              /* increased width */
            max-width: 90%;
            height: 85vh;              /* takes screen height */
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: #4a90e2;
            color: white;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fbfd;
        }

        /* MESSAGE STYLE */
        .message {
            margin: 10px 0;
            padding: 12px 14px;
            border-radius: 12px;
            max-width: 75%;
            line-height: 1.4;
            white-space: pre-line;
        }

        /* USER MESSAGE */
        .user {
            background: #4a90e2;
            color: white;
            margin-left: auto;
        }

        /* BOT MESSAGE */
        .bot {
            background: #e5e5ea;
            color: #000;
        }

        /* INPUT AREA */
        .input-box {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
        }

        button:hover {
            background: #357abd;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">AI Enquiry Chatbot</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="input" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
function add(text, type) {
    let div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 9999;
}

function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();

    if (!msg) return;

    add(msg, "user");

    fetch("/chat/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => add(data.reply, "bot"));

    input.value = "";
}

/* ✅ ENTER KEY WORKING */
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});

/* INITIAL MESSAGE */
window.onload = () => {
    add("Hi 👋 Ask me about courses!", "bot");
};
</script>

</body>
</html>
